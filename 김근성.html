<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>슈팅 게임</title>

<style>
body{
   text-align:center;
   background:black;
   color:white;
   font-family:Arial;
}

canvas{
   background:#111;
   display:block;
   margin:auto;
   border:2px solid white;
   margin-top: 15px;
}
</style>
</head>

<body>

<h1>🚀 슈팅 게임</h1>
<p>← → 로 이동 | 스페이스바 발사</p>

<p>점수: <span id="score">0</span></p>

<canvas id="game" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
   x: 280,
   y: 350,
   width: 40,
   height: 20,
   speed: 6
};

let bullets = [];
let enemies = [];
let score = 0;

let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

document.addEventListener("keydown", function(e){
   if(e.code === "Space"){
      bullets.push({
         x: player.x + 18,
         y: player.y
      });
   }
});

function spawnEnemy(){
   enemies.push({
      x: Math.random() * 560,
      y: 0,
      size: 30
   });
}

setInterval(spawnEnemy, 1000);

function update(){
   // 개선: 플레이어가 캔버스(화면) 밖으로 나가지 않도록 경계값 추가
   if(keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
   if(keys["ArrowRight"] && player.x < canvas.width - player.width) player.x += player.speed;

   bullets.forEach(b => b.y -= 8);
   enemies.forEach(e => e.y += 2);

   // 개선: 배열에서 항목을 삭제(splice)할 때는 역순으로 순회해야 요소가 건너뛰어지는 버그를 막을 수 있습니다.
   for (let bi = bullets.length - 1; bi >= 0; bi--) {
       let b = bullets[bi];
       for (let ei = enemies.length - 1; ei >= 0; ei--) {
           let e = enemies[ei];

           if (b.x < e.x + e.size &&
               b.x + 5 > e.x &&
               b.y < e.y + e.size &&
               b.y + 10 > e.y) {

               bullets.splice(bi, 1);
               enemies.splice(ei, 1);
               score++;
               document.getElementById("score").innerText = score;
               break; // 총알 하나가 적을 맞추면, 해당 총알의 남은 적 확인을 중단합니다.
           }
       }
   }
}

function draw(){
   ctx.clearRect(0, 0, canvas.width, canvas.height);

   ctx.fillStyle = "cyan";
   ctx.fillRect(player.x, player.y, player.width, player.height);

   ctx.fillStyle = "yellow";
   bullets.forEach(b => {
      ctx.fillRect(b.x, b.y, 5, 10);
   });

   ctx.fillStyle = "red";
   enemies.forEach(e => {
      ctx.fillRect(e.x, e.y, e.size, e.size);
   });
}

function gameLoop(){
   update();
   draw();
   requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
